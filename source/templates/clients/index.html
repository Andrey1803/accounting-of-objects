<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>База клиентов</title>
    <link rel="stylesheet" href="/static/css/base.css?v=1">
    <link rel="stylesheet" href="/static/css/components.css?v=1">
    <style>
        /* Page-specific styles */
        .header { background: linear-gradient(135deg, #9C27B0, #7B1FA2); }
        .stat-card .value { color: #9C27B0; }
        th { background: #9C27B0; }
        .stats-bar { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 15px; }
        .search-bar input { flex: 1; padding: 10px 15px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .modal-content h2 { color: #9C27B0; }
    </style>
</head>
<body>
    <div class="header">
        <h1>👥 БАЗА КЛИЕНТОВ</h1>
        <div class="header-actions">
            <a href="/" class="btn btn-secondary">Объекты</a>
            <a href="/stats" class="btn btn-secondary">Статистика</a>
            <a href="/estimate/" class="btn btn-secondary">Сметы</a>
            <button class="btn btn-primary" onclick="openModal()">+ Добавить</button>
        </div>
    </div>
    <div class="container">
        <div class="stats-bar">
            <div class="stat-card"><div class="value" id="stat-total">...</div><div class="label">Клиентов</div></div>
            <div class="stat-card"><div class="value" id="stat-objects">...</div><div class="label">Объектов</div></div>
        </div>
        <div class="search-bar"><input type="text" id="search" placeholder="Поиск..."></div>
        <div class="table-wrapper">
            <table><thead><tr><th>ID</th><th>ФИО / Организация</th><th>Телефон</th><th>Email</th><th>Адрес</th><th>Действия</th></tr></thead>
            <tbody id="table-body"></tbody></table>
        </div>
    </div>
    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 id="modal-title">Добавить клиента</h2>
            <form id="client-form">
                <input type="hidden" id="client-id">
                <div class="form-group"><label>ФИО / Организация *</label><input type="text" id="name" required></div>
                <div class="form-group"><label>Телефон</label><input type="text" id="phone"></div>
                <div class="form-group"><label>Email</label><input type="email" id="email"></div>
                <div class="form-group"><label>Адрес</label><textarea id="address"></textarea></div>
                <div class="modal-buttons"><button type="submit" class="btn btn-primary">💾 Сохранить</button><button type="button" class="btn btn-cancel" onclick="closeModal()">Отмена</button></div>
            </form>
        </div>
    </div>
    <script src="/static/js/offline.js?v=3"></script>
    <script src="/static/js/api.js?v=2"></script>
    <script src="/static/js/ui.js?v=1"></script>
    <script src="/static/js/clients.js?v=2"></script>
</body>
</html>
