<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>Прибыль</title>
    <link rel="stylesheet" href="/static/css/base.css?v=2">
    <link rel="stylesheet" href="/static/css/components.css?v=1">
    <style>
        .header { background: linear-gradient(135deg, #4CAF50, #388E3C); }
        .card .val { color: #4CAF50; }
        table th { background: #4CAF50; cursor: pointer; user-select: none; }
        table th.sorted { background: #2e7d32; }
        table th.sortable:hover { background: #43a047; }
        table th.no-sort { cursor: default; }
        .profit-pos { color: #4CAF50; font-weight: bold; }
        .profit-neg { color: #f44336; font-weight: bold; }
        .margin-bar { height: 20px; border-radius: 4px; min-width: 30px; text-align: center; color: white; font-size: 11px; line-height: 20px; }
        .profit-toolbar { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 12px; }
        .profit-toolbar label { font-weight: 600; color: #444; }
        .profit-toolbar select { padding: 8px 12px; border-radius: 8px; border: 1px solid #ccc; min-width: 200px; }
        .profit-view-tabs { display: flex; flex-wrap: wrap; gap: 6px; }
        .profit-view-tabs button {
            padding: 8px 14px;
            border: 1px solid #ccc;
            background: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .profit-view-tabs button.active { background: #4CAF50; color: #fff; border-color: #388E3C; }
        .profit-view-tabs button:hover:not(.active) { background: #f1f8e9; }
        .profit-cell { min-width: 9.5rem; vertical-align: top; }
        .profit-main { line-height: 1.25; font-size: 1rem; }
        .profit-split {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 0.35rem;
            margin-top: 0.35rem;
            padding-top: 0.3rem;
            border-top: 1px dashed #ddd;
            font-size: 0.68rem;
            font-weight: 600;
            line-height: 1.15;
        }
        .profit-split-item { flex: 1 1 50%; display: flex; flex-direction: column; gap: 0.1rem; }
        .profit-split-work { color: #1565c0; text-align: left; }
        .profit-split-mat { color: #e65100; text-align: right; align-items: flex-end; }
        .profit-split-lbl {
            font-size: 0.62rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            opacity: 0.85;
        }
        .profit-split-val { font-size: 0.72rem; }
        .profit-split-neg { color: #c62828 !important; }
        .profit-col-hint {
            display: block;
            margin-top: 0.2rem;
            font-size: 0.62rem;
            font-weight: 600;
            opacity: 0.85;
            line-height: 1.1;
            text-transform: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📈 Прибыль</h1>
        <p class="subtitle" id="profit-subtitle" style="margin:0.35rem 0 0;font-size:0.9rem;opacity:0.9;">Список объектов с прибылью.</p>
        <div class="header-actions">
            {% include 'partials/dispatcher_switch.html' %}
            <a href="/" class="btn btn-secondary">← Объекты</a>
            <a href="/stats" class="btn btn-secondary">📊 Статистика</a>
        </div>
    </div>
    <div class="container">
        <div class="summary">
            <div class="card"><div class="val" id="s-objects">0</div><div class="lbl" id="s-objects-lbl">Объектов</div></div>
            <div class="card"><div class="val" id="s-revenue">0</div><div class="lbl">Общая выручка</div></div>
            <div class="card"><div class="val" id="s-profit">0</div><div class="lbl">Общая прибыль</div></div>
            <div class="card"><div class="val" id="s-margin">0%</div><div class="lbl">Средняя маржа</div></div>
        </div>
        <div class="profit-toolbar">
            <div class="profit-view-tabs" role="tablist" aria-label="Вид прибыли">
                <button type="button" class="active" data-view="objects" role="tab" aria-selected="true">По объектам</button>
                <button type="button" data-view="days" role="tab" aria-selected="false">По дням</button>
                <button type="button" data-view="months" role="tab" aria-selected="false">По месяцам</button>
            </div>
            <label for="sort-by">Сортировка</label>
            <select id="sort-by" aria-label="Сортировка таблицы"></select>
        </div>
        <div class="table-wrapper table-pan-viewport" title="Прокрутка и перетаскивание мышью по таблице">
            <table>
                <thead id="tbl-head"></thead>
                <tbody id="tbl"></tbody>
            </table>
        </div>
    </div>
    <script>
        var profitRows = [];
        var viewMode = 'objects';
        var currentSort = 'date-desc';

        var SORT_OPTIONS = {
            objects: [
                { value: 'date-desc', label: 'Дата — новые сверху' },
                { value: 'date-asc', label: 'Дата — старые сверху' },
                { value: 'profit-desc', label: 'Прибыль (больше сначала)' },
                { value: 'profit-asc', label: 'Прибыль (меньше сначала)' },
                { value: 'revenue-desc', label: 'Выручка' },
                { value: 'client-asc', label: 'Клиент А–Я' },
                { value: 'name-asc', label: 'Объект А–Я' }
            ],
            days: [
                { value: 'date-desc', label: 'День — новые сверху' },
                { value: 'date-asc', label: 'День — старые сверху' },
                { value: 'profit-desc', label: 'Прибыль (больше сначала)' },
                { value: 'profit-asc', label: 'Прибыль (меньше сначала)' },
                { value: 'revenue-desc', label: 'Выручка' }
            ],
            months: [
                { value: 'date-desc', label: 'Месяц — новые сверху' },
                { value: 'date-asc', label: 'Месяц — старые сверху' },
                { value: 'profit-desc', label: 'Прибыль (больше сначала)' },
                { value: 'profit-asc', label: 'Прибыль (меньше сначала)' },
                { value: 'revenue-desc', label: 'Выручка' }
            ]
        };

        var SUBTITLES = {
            objects: 'В колонке «Прибыль»: сверху общая сумма, ниже — с работ и с материалов.',
            days: 'Сумма прибыли по календарным дням (объект учитывается в день начала работ по календарю).',
            months: 'Сумма прибыли по календарным месяцам (месяц — по первой рабочей дате объекта).'
        };

        function money(v) {
            return Number(v || 0).toLocaleString('ru-RU', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' BYN';
        }
        function esc(s) {
            if (!s) return '';
            var d = document.createElement('div');
            d.textContent = String(s);
            return d.innerHTML;
        }
        function formatDateRu(ymd) {
            if (!ymd || ymd === '9999-12-31') return '—';
            var p = String(ymd).slice(0, 10).split('-');
            if (p.length < 3) return ymd;
            return p[2] + '.' + p[1] + '.' + p[0];
        }
        function formatMonthRu(ym) {
            if (!ym || ym.length < 7) return ym || '—';
            var p = ym.split('-');
            var y = Number(p[0]), m = Number(p[1]);
            if (!y || !m) return ym;
            return new Date(y, m - 1, 1).toLocaleDateString('ru-RU', { month: 'long', year: 'numeric' });
        }
        function parseWorkDatesFromObject(o) {
            var raw = o.work_dates;
            if (!raw) return [];
            try {
                var arr = typeof raw === 'string' ? JSON.parse(raw) : raw;
                if (Array.isArray(arr)) {
                    return arr.filter(Boolean).map(function (d) { return String(d).slice(0, 10); }).sort();
                }
            } catch (e) { /* ignore */ }
            return [];
        }
        function objectAnchorDate(o) {
            var days = parseWorkDatesFromObject(o);
            if (days.length) return days[0];
            var ds = String(o.date_start || '').trim().slice(0, 10);
            return ds || '9999-12-31';
        }
        function objectAnchorMonth(o) {
            var d = objectAnchorDate(o);
            return d && d.length >= 7 ? d.slice(0, 7) : '0000-00';
        }
        function objectTotalRevenue(o) {
            if (o.total_revenue != null && o.total_revenue !== '') {
                var tr = Number(o.total_revenue);
                if (!Number.isNaN(tr)) return tr;
            }
            var sw = Number(o.sum_work) || 0, ew = Number(o.estimate_works) || 0, em = Number(o.estimate_materials) || 0;
            return Math.max(sw, ew) + em;
        }
        function objectBalance(o) {
            if (o.balance != null && o.balance !== '') {
                var b = Number(o.balance);
                if (!Number.isNaN(b)) return b;
            }
            return objectTotalRevenue(o) - (Number(o.advance) || 0);
        }
        function objectTotalExpensesFallback(o) {
            var em = Number(o.estimate_materials) || 0, emp = Number(o.estimate_material_profit) || 0, raw = Number(o.expenses) || 0;
            var emc = Number(o.estimate_material_cost) || Number(o.est_mat_cost) || 0;
            var mcogs = emc > 0 ? emc : (emp > 0 ? Math.max(0, em - emp) : 0);
            var other = (em > 0 && raw + 1e-9 >= em) ? Math.max(0, raw - em) : ((emc > 0 && raw + 1e-9 >= emc) ? Math.max(0, raw - emc) : raw);
            return mcogs + other;
        }
        function objectExpenses(o) {
            return o.total_expenses != null && o.total_expenses !== '' ? Number(o.total_expenses) : objectTotalExpensesFallback(o);
        }
        function objectProfit(o) {
            if (o.total_profit != null && o.total_profit !== '') return Number(o.total_profit);
            var rev = objectTotalRevenue(o);
            var exp = objectExpenses(o);
            return rev - exp - (Number(o.salary) || 0);
        }
        function objectMaterialProfit(o) {
            if (o.profit_material != null && o.profit_material !== '') {
                var pm = Number(o.profit_material);
                if (!Number.isNaN(pm)) return pm;
            }
            if (o.estimate_material_profit != null && o.estimate_material_profit !== '') {
                var emp = Number(o.estimate_material_profit);
                if (!Number.isNaN(emp)) return emp;
            }
            if (o.est_mat_profit != null && o.est_mat_profit !== '') {
                var empLegacy = Number(o.est_mat_profit);
                if (!Number.isNaN(empLegacy)) return empLegacy;
            }
            var em = Number(o.estimate_materials) || Number(o.est_materials) || 0;
            var emc = Number(o.estimate_material_cost) || Number(o.est_mat_cost) || 0;
            if (emc > 0 && em > 0) return Math.max(0, em - emc);
            return 0;
        }
        function objectWorkProfit(o) {
            if (o.profit_work != null && o.profit_work !== '') {
                var pw = Number(o.profit_work);
                if (!Number.isNaN(pw)) return pw;
            }
            var workRev = Math.max(Number(o.sum_work) || 0, Number(o.estimate_works) || 0);
            var sal = Number(o.salary) || 0;
            if (workRev > 0) return workRev - sal;
            return objectProfit(o) - objectMaterialProfit(o);
        }
        function profitCompact(v) {
            return Number(v || 0).toLocaleString('ru-RU', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }
        function profitCellHtml(totalProf, workProf, matProf) {
            var mainCls = totalProf >= 0 ? 'profit-pos' : 'profit-neg';
            var workCls = workProf >= 0 ? '' : ' profit-split-neg';
            var matCls = matProf >= 0 ? '' : ' profit-split-neg';
            return '<div class="profit-cell">' +
                '<div class="profit-main ' + mainCls + '" title="Общая прибыль">' + money(totalProf) + '</div>' +
                '<div class="profit-split">' +
                '<div class="profit-split-item profit-split-work' + workCls + '">' +
                '<span class="profit-split-lbl">работы</span>' +
                '<span class="profit-split-val">' + profitCompact(workProf) + '</span>' +
                '</div>' +
                '<div class="profit-split-item profit-split-mat' + matCls + '">' +
                '<span class="profit-split-lbl">материалы</span>' +
                '<span class="profit-split-val">' + profitCompact(matProf) + '</span>' +
                '</div>' +
                '</div></div>';
        }
        function profitColHeaderHtml() {
            return 'Прибыль<span class="profit-col-hint">↓ работы · материалы</span>';
        }
        function objectSalary(o) {
            return Number(o.salary) || 0;
        }
        function clientDisplayName(o, namesById) {
            var cid = Number(o.client_id);
            if (cid > 0 && namesById[cid]) return namesById[cid];
            var c = (o.client || '').trim();
            return c || 'Без клиента';
        }
        function marginPct(rev, prof) {
            return rev > 0 ? ((prof / rev) * 100) : 0;
        }
        function marginBarHtml(rev, prof) {
            var marg = marginPct(rev, prof).toFixed(1);
            var margColor = marg >= 30 ? '#4CAF50' : marg >= 10 ? '#FF9800' : '#f44336';
            return '<div class="margin-bar" style="background:' + margColor + '">' + marg + '%</div>';
        }

        function buildPeriodGroups(keyFn) {
            var map = {};
            profitRows.forEach(function (o) {
                var key = keyFn(o);
                if (!map[key]) {
                    map[key] = { key: key, objects: 0, revenue: 0, expenses: 0, salary: 0, profit: 0, workProfit: 0, matProfit: 0 };
                }
                var g = map[key];
                g.objects += 1;
                g.revenue += objectTotalRevenue(o);
                g.expenses += objectExpenses(o);
                g.salary += objectSalary(o);
                g.profit += objectProfit(o);
                g.workProfit += objectWorkProfit(o);
                g.matProfit += objectMaterialProfit(o);
            });
            return Object.keys(map).map(function (k) { return map[k]; });
        }

        function compareObjects(a, b, sortKey) {
            if (sortKey === 'date-desc') {
                var da = objectAnchorDate(a), db = objectAnchorDate(b);
                if (da !== db) return db.localeCompare(da);
                return (Number(b.id) || 0) - (Number(a.id) || 0);
            }
            if (sortKey === 'date-asc') {
                var da2 = objectAnchorDate(a), db2 = objectAnchorDate(b);
                if (da2 !== db2) return da2.localeCompare(db2);
                return (Number(a.id) || 0) - (Number(b.id) || 0);
            }
            if (sortKey === 'profit-desc') return objectProfit(b) - objectProfit(a);
            if (sortKey === 'profit-asc') return objectProfit(a) - objectProfit(b);
            if (sortKey === 'revenue-desc') return objectTotalRevenue(b) - objectTotalRevenue(a);
            if (sortKey === 'client-asc') {
                return (a._clientLabel || '').toLowerCase().localeCompare((b._clientLabel || '').toLowerCase(), 'ru');
            }
            if (sortKey === 'name-asc') {
                return String(a.name || '').localeCompare(String(b.name || ''), 'ru');
            }
            return 0;
        }

        function compareGroups(a, b, sortKey) {
            if (sortKey === 'date-desc') return String(b.key).localeCompare(String(a.key));
            if (sortKey === 'date-asc') return String(a.key).localeCompare(String(b.key));
            if (sortKey === 'profit-desc') return b.profit - a.profit;
            if (sortKey === 'profit-asc') return a.profit - b.profit;
            if (sortKey === 'revenue-desc') return b.revenue - a.revenue;
            return 0;
        }

        function refreshSortSelect() {
            var sel = document.getElementById('sort-by');
            var opts = SORT_OPTIONS[viewMode] || SORT_OPTIONS.objects;
            var prev = currentSort;
            sel.innerHTML = '';
            var hasPrev = false;
            opts.forEach(function (o) {
                var opt = document.createElement('option');
                opt.value = o.value;
                opt.textContent = o.label;
                if (o.value === prev) { opt.selected = true; hasPrev = true; }
                sel.appendChild(opt);
            });
            if (!hasPrev) {
                currentSort = opts[0].value;
                sel.value = currentSort;
            }
        }

        function renderTableHead() {
            var head = document.getElementById('tbl-head');
            if (viewMode === 'days') {
                head.innerHTML = '<tr><th class="no-sort">№</th><th class="sortable" data-sort="date">День</th><th class="no-sort">Объектов</th><th class="sortable" data-sort="revenue">Выручка</th><th class="no-sort">Затраты</th><th class="no-sort">Зарплата</th><th class="sortable" data-sort="profit">' + profitColHeaderHtml() + '</th><th class="no-sort">Маржа</th></tr>';
            } else if (viewMode === 'months') {
                head.innerHTML = '<tr><th class="no-sort">№</th><th class="sortable" data-sort="date">Месяц</th><th class="no-sort">Объектов</th><th class="sortable" data-sort="revenue">Выручка</th><th class="no-sort">Затраты</th><th class="no-sort">Зарплата</th><th class="sortable" data-sort="profit">' + profitColHeaderHtml() + '</th><th class="no-sort">Маржа</th></tr>';
            } else {
                head.innerHTML = '<tr><th class="no-sort">№</th><th class="sortable" data-sort="date">Дата</th><th class="sortable" data-sort="name">Объект</th><th class="sortable" data-sort="client">Клиент</th><th class="sortable" data-sort="revenue">Выручка</th><th class="no-sort">Затраты</th><th class="no-sort">Зарплата</th><th class="sortable" data-sort="profit">' + profitColHeaderHtml() + '</th><th class="no-sort">Маржа</th><th class="no-sort">Долг</th><th class="no-sort">Статус</th></tr>';
            }
            bindSortHeaders();
        }

        function updateSortHeaders() {
            var ths = document.querySelectorAll('table th.sortable');
            for (var i = 0; i < ths.length; i++) {
                var th = ths[i];
                var sk = th.getAttribute('data-sort');
                var on = (sk === 'date' && (currentSort === 'date-desc' || currentSort === 'date-asc'))
                    || (sk === 'profit' && (currentSort === 'profit-desc' || currentSort === 'profit-asc'))
                    || (sk === 'revenue' && currentSort === 'revenue-desc')
                    || (sk === 'client' && currentSort === 'client-asc')
                    || (sk === 'name' && currentSort === 'name-asc');
                th.classList.toggle('sorted', on);
            }
        }

        function updateSummaryObjectsLabel() {
            var lbl = document.getElementById('s-objects-lbl');
            if (viewMode === 'days') lbl.textContent = 'Дней';
            else if (viewMode === 'months') lbl.textContent = 'Месяцев';
            else lbl.textContent = 'Объектов';
        }

        function renderTable() {
            document.getElementById('profit-subtitle').textContent = SUBTITLES[viewMode] || SUBTITLES.objects;
            updateSummaryObjectsLabel();

            var tbl = document.getElementById('tbl');
            tbl.innerHTML = '';

            if (viewMode === 'days' || viewMode === 'months') {
                var keyFn = viewMode === 'days' ? objectAnchorDate : objectAnchorMonth;
                var groups = buildPeriodGroups(keyFn).sort(function (a, b) { return compareGroups(a, b, currentSort); });
                var totalRev = 0, totalProf = 0;
                groups.forEach(function (g) {
                    totalRev += g.revenue;
                    totalProf += g.profit;
                });
                document.getElementById('s-objects').textContent = groups.length;
                document.getElementById('s-revenue').textContent = money(totalRev);
                document.getElementById('s-profit').textContent = money(totalProf);
                document.getElementById('s-margin').textContent = (totalRev > 0 ? ((totalProf / totalRev) * 100).toFixed(1) : '0') + '%';

                if (groups.length === 0) {
                    tbl.innerHTML = '<tr><td colspan="8" style="padding:30px;text-align:center;color:#999;">Нет данных</td></tr>';
                    updateSortHeaders();
                    return;
                }
                groups.forEach(function (g, i) {
                    var label = viewMode === 'days' ? formatDateRu(g.key) : formatMonthRu(g.key);
                    var tr = document.createElement('tr');
                    tr.innerHTML =
                        '<td>' + (i + 1) + '</td>' +
                        '<td style="white-space:nowrap;font-weight:600">' + esc(label) + '</td>' +
                        '<td>' + g.objects + '</td>' +
                        '<td>' + money(g.revenue) + '</td>' +
                        '<td>' + money(g.expenses) + '</td>' +
                        '<td>' + money(g.salary) + '</td>' +
                        '<td>' + profitCellHtml(g.profit, g.workProfit, g.matProfit) + '</td>' +
                        '<td>' + marginBarHtml(g.revenue, g.profit) + '</td>';
                    tbl.appendChild(tr);
                });
                updateSortHeaders();
                return;
            }

            var sorted = profitRows.slice().sort(function (a, b) { return compareObjects(a, b, currentSort); });
            var totalRev = 0, totalProf = 0;
            sorted.forEach(function (o) {
                totalRev += objectTotalRevenue(o);
                totalProf += objectProfit(o);
            });
            document.getElementById('s-objects').textContent = sorted.length;
            document.getElementById('s-revenue').textContent = money(totalRev);
            document.getElementById('s-profit').textContent = money(totalProf);
            document.getElementById('s-margin').textContent = (totalRev > 0 ? ((totalProf / totalRev) * 100).toFixed(1) : '0') + '%';

            if (sorted.length === 0) {
                tbl.innerHTML = '<tr><td colspan="11" style="padding:30px;text-align:center;color:#999;">Нет объектов</td></tr>';
                updateSortHeaders();
                return;
            }
            sorted.forEach(function (o, i) {
                var rev = objectTotalRevenue(o);
                var exp = objectExpenses(o);
                var sal = objectSalary(o);
                var prof = objectProfit(o);
                var workProf = objectWorkProfit(o);
                var matProf = objectMaterialProfit(o);
                var bal = objectBalance(o);
                var debt = (bal > 0 && o.status !== 'Ожидает старта' && o.status !== 'Запланирован') ? bal : 0;
                var tr = document.createElement('tr');
                tr.innerHTML =
                    '<td>' + (i + 1) + '</td>' +
                    '<td style="white-space:nowrap">' + esc(formatDateRu(objectAnchorDate(o))) + '</td>' +
                    '<td style="text-align:left;font-weight:600">' + esc(o.name) + '</td>' +
                    '<td style="text-align:left">' + esc(o._clientLabel) + '</td>' +
                    '<td>' + money(rev) + '</td>' +
                    '<td>' + money(exp) + '</td>' +
                    '<td>' + money(sal) + '</td>' +
                    '<td>' + profitCellHtml(prof, workProf, matProf) + '</td>' +
                    '<td>' + marginBarHtml(rev, prof) + '</td>' +
                    '<td class="' + (debt > 0 ? 'profit-neg' : '') + '">' + money(debt) + '</td>' +
                    '<td>' + esc(o.status || '') + '</td>';
                tbl.appendChild(tr);
            });
            updateSortHeaders();
        }

        function setSort(key) {
            currentSort = key;
            var sel = document.getElementById('sort-by');
            if (sel && sel.value !== key) sel.value = key;
            renderTable();
        }

        function setViewMode(mode) {
            if (viewMode === mode) return;
            viewMode = mode;
            document.querySelectorAll('.profit-view-tabs button').forEach(function (btn) {
                var on = btn.getAttribute('data-view') === mode;
                btn.classList.toggle('active', on);
                btn.setAttribute('aria-selected', on ? 'true' : 'false');
            });
            refreshSortSelect();
            renderTableHead();
            renderTable();
        }

        function bindSortHeaders() {
            document.querySelectorAll('table th.sortable').forEach(function (th) {
                th.onclick = function () {
                    var sk = th.getAttribute('data-sort');
                    if (sk === 'date') {
                        setSort(currentSort === 'date-desc' ? 'date-asc' : 'date-desc');
                    } else if (sk === 'profit') {
                        setSort(currentSort === 'profit-desc' ? 'profit-asc' : 'profit-desc');
                    } else if (sk === 'revenue') {
                        setSort('revenue-desc');
                    } else if (sk === 'client') {
                        setSort('client-asc');
                    } else if (sk === 'name') {
                        setSort('name-asc');
                    }
                };
            });
        }

        async function load() {
            try {
                var r = await fetch('/api/objects-with-estimates');
                var rc = await fetch('/api/clients').catch(function () { return null; });
                var d = await r.json();
                var objs = d.objects || [];
                var namesById = {};
                if (rc && rc.ok) {
                    var cl = await rc.json();
                    (cl || []).forEach(function (row) {
                        if (row.id != null) namesById[Number(row.id)] = (row.name || '').trim();
                    });
                }
                profitRows = objs.map(function (o) {
                    var copy = o;
                    copy._clientLabel = clientDisplayName(o, namesById);
                    return copy;
                });
                refreshSortSelect();
                renderTableHead();
                setSort(document.getElementById('sort-by').value || 'date-desc');
            } catch (e) {
                document.getElementById('tbl').innerHTML =
                    '<tr><td colspan="11" style="padding:30px;text-align:center;color:red;">Ошибка: ' + esc(e.message) + '</td></tr>';
            }
        }

        document.getElementById('sort-by').addEventListener('change', function () {
            setSort(this.value);
        });
        document.querySelectorAll('.profit-view-tabs button').forEach(function (btn) {
            btn.addEventListener('click', function () {
                setViewMode(btn.getAttribute('data-view'));
            });
        });

        refreshSortSelect();
        renderTableHead();
        load();
    </script>
    <script src="/static/js/table-pan.js?v=1"></script>
</body>
</html>
