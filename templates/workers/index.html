<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>Рабочие</title>
    <link rel="stylesheet" href="/static/css/base.css?v=2">
    <link rel="stylesheet" href="/static/css/components.css?v=1">
    <style>
        /* Page-specific styles — all styles are covered in base/components.css */
    </style>
</head>
<body>
    <div class="header">
        <h1>👷 Рабочие</h1>
        <a href="/" class="btn btn-back">На главную</a>
    </div>

    <div class="container">
        <!-- Статистика -->
        <div class="stats">
            <div class="stat-card">
                <div class="num" id="statTotal">0</div>
                <div class="label">Всего рабочих</div>
            </div>
            <div class="stat-card">
                <div class="num" id="statActive">0</div>
                <div class="label">Активных</div>
            </div>
            <div class="stat-card">
                <div class="num">150 ₽</div>
                <div class="label">Ставка по умолчанию</div>
            </div>
        </div>

        <!-- Таблица рабочих -->
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h2 style="color:#2E75B6; font-size:16px;">Список рабочих</h2>
                <button class="btn btn-add" onclick="openModal()">+ Добавить рабочего</button>
            </div>
            <div class="table-wrapper table-pan-viewport" title="Прокрутка и перетаскивание мышью по таблице">
            <table>
                <thead>
                    <tr>
                        <th>ФИО</th>
                        <th>Телефон</th>
                        <th>Ставка/день</th>
                        <th>Дата найма</th>
                        <th>Статус</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="workersTable"></tbody>
            </table>
            </div>
        </div>
    </div>

    <!-- Модальное окно -->
    <div class="modal" id="workerModal">
        <div class="modal-content">
            <h2 id="modalTitle">Добавить рабочего</h2>
            <input type="hidden" id="w-id">
            <div class="fg">
                <label>ФИО *</label>
                <input type="text" id="w-name" placeholder="Иванов Иван Иванович">
            </div>
            <div class="fg">
                <label>Телефон</label>
                <input type="text" id="w-phone" placeholder="+375 (XX) XXX-XX-XX">
            </div>
            <div class="fg">
                <label>Ставка в день (руб)</label>
                <input type="number" id="w-rate" value="150" step="10">
            </div>
            <div class="fg">
                <label>Дата найма</label>
                <input type="date" id="w-hire-date">
            </div>
            <div class="fg">
                <label>Заметки</label>
                <textarea id="w-notes" rows="2" placeholder="Дополнительная информация"></textarea>
            </div>
            <div class="fg">
                <label>
                    <input type="checkbox" id="w-active" checked> Активный
                </label>
            </div>
            <div class="modal-actions">
                <button class="btn" style="background:#999" onclick="closeModal()">Отмена</button>
                <button class="btn btn-save" onclick="saveWorker()">Сохранить</button>
            </div>
        </div>
    </div>

    <script src="/static/js/api.js?v=2"></script>
    <script src="/static/js/ui.js?v=1"></script>
    <script src="/static/js/workers.js?v=2"></script>
    <script src="/static/js/table-pan.js?v=1"></script>
</body>
</html>
