<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>Статистика</title>
    <link rel="stylesheet" href="/static/css/base.css?v=1">
    <link rel="stylesheet" href="/static/css/components.css?v=1">
    <style>
        .header { background: #2E75B6; }
        .chart-section-head { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 0.75rem; margin-bottom: 0.5rem; }
        .chart-mode-tabs { display: flex; flex-wrap: wrap; gap: 6px; }
        .chart-mode-tab {
            border: 1px solid #ccc;
            background: #f8f9fa;
            color: #333;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }
        .chart-mode-tab:hover { background: #eef4fb; border-color: #2E75B6; }
        .chart-mode-tab.active { background: #2E75B6; color: #fff; border-color: #2E75B6; font-weight: 600; }
        .chart-box { min-height: 260px; display: flex; align-items: flex-end; gap: 8px; overflow-x: auto; padding: 10px 0 4px; }
        .bar-col { display: flex; flex-direction: column; align-items: center; flex: 0 0 auto; min-width: 72px; max-width: 100px; }
        .bar-stack { display: flex; gap: 3px; align-items: flex-end; height: 200px; }
        .bar { width: 18px; border-radius: 3px 3px 0 0; min-height: 2px; }
        .bar-wide { width: 28px; }
        .bar-r { background: #2E75B6; }
        .bar-p { background: #4CAF50; }
        .bar-e { background: #FF9800; }
        .bar-d { background: #e53935; }
        .bar-a { background: #5c6bc0; }
        .card .val.red { color: #c62828; }
        .card .val.muted { color: #666; font-size: 0.95rem; }
        .metrics-hint { font-size: 0.78rem; color: #888; margin-top: 0.2rem; }
        .compare-chip .chip-month { font-size: 0.7rem; color: #888; font-weight: normal; }
        .debt-panel {
            display: grid;
            grid-template-columns: minmax(200px, 280px) 1fr;
            gap: 1.25rem;
            align-items: center;
        }
        @media (max-width: 720px) { .debt-panel { grid-template-columns: 1fr; } }
        .debt-big { font-size: 1.75rem; font-weight: 700; color: #c62828; line-height: 1.2; }
        .debt-sub { font-size: 0.88rem; color: #666; margin-top: 0.35rem; }
        .collection-track {
            height: 22px;
            border-radius: 11px;
            background: #ffebee;
            overflow: hidden;
            display: flex;
            margin: 0.75rem 0 0.35rem;
        }
        .collection-paid { background: linear-gradient(90deg, #5c6bc0, #7986cb); height: 100%; min-width: 2px; }
        .collection-debt { background: linear-gradient(90deg, #e53935, #ef5350); height: 100%; min-width: 2px; }
        .compare-row { display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 0.75rem; font-size: 0.9rem; }
        .compare-chip { background: #f5f7fa; border-radius: 10px; padding: 0.5rem 0.75rem; flex: 1; min-width: 140px; }
        .compare-chip strong { display: block; font-size: 0.75rem; color: #666; margin-bottom: 0.2rem; }
        .bar-label { font-size: 11px; color: #444; margin-top: 6px; text-align: center; font-weight: 600; line-height: 1.2; }
        .bar-sums { font-size: 10px; color: #333; text-align: center; margin-top: 4px; line-height: 1.35; width: 100%; word-break: break-word; }
        .bar-sums .sr { color: #1E5A8E; font-weight: 600; }
        .bar-sums .sp { color: #2e7d32; font-weight: 600; }
        .chart-line-wrap { width: 100%; overflow-x: auto; padding: 8px 0; }
        .chart-line-wrap svg { display: block; min-width: 320px; margin: 0 auto; }
        .chart-legend-mini { display: flex; gap: 14px; justify-content: center; margin-top: 8px; font-size: 12px; flex-wrap: wrap; }
        .card h3 { font-size: 0.82rem; color: #666; margin: 0 0 0.35rem; font-weight: 600; }
        .card .val.blue { color: #2E75B6; }
        .card .val.green { color: #2e7d32; }
        .card .val.orange { color: #e65100; }
        .card .val.purple { color: #7b1fa2; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; margin: 3px; }
        .st-Запланирован, .st-Ожидает-старта { background: #FFEB9C; color: #666; } .st-В-работе { background: #BDD7EE; color: #1E5A8E; }
        .st-Приостановлен { background: #FFC7CE; color: #9C0006; } .st-Завершён, .st-Выполнен { background: #C6EFCE; color: #006100; } .st-Оплачен, .st-Закрыт { background: #E2EFDA; color: #333; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 Статистика</h1>
        <div style="display:flex; flex-wrap:wrap; gap:10px; align-items:center;">
            {% include 'partials/dispatcher_switch.html' %}
            <a href="/" class="btn btn-back">← На главную</a>
        </div>
    </div>
    <div id="loading" class="loading">Загрузка...</div>
    <div id="content" style="display:none;">
        <div class="grid metrics" id="metrics"></div>
        <div class="section" id="debt-section">
            <h2>Задолженность и поступления</h2>
            <div class="debt-panel" id="debt-panel"></div>
        </div>
        <div class="section" id="month-compare-section" style="display:none;">
            <h2>Сравнение с прошлым месяцем</h2>
            <div id="month-compare"></div>
        </div>
        <div class="section">
            <h2>Статусы</h2>
            <div id="statuses"></div>
        </div>
        <div class="section">
            <div class="chart-section-head">
                <h2 style="margin:0;">Выручка и прибыль по месяцам</h2>
                <div class="chart-mode-tabs" role="tablist" aria-label="Тип графика">
                    <button type="button" class="chart-mode-tab active" data-mode="both" role="tab" aria-selected="true">Столбцы: выручка + прибыль</button>
                    <button type="button" class="chart-mode-tab" data-mode="revenue" role="tab" aria-selected="false">Выручка</button>
                    <button type="button" class="chart-mode-tab" data-mode="profit" role="tab" aria-selected="false">Прибыль</button>
                    <button type="button" class="chart-mode-tab" data-mode="expenses" role="tab" aria-selected="false">Расходы</button>
                    <button type="button" class="chart-mode-tab" data-mode="trend" role="tab" aria-selected="false">Линии (В и П)</button>
                    <button type="button" class="chart-mode-tab" data-mode="debt" role="tab" aria-selected="false">Задолженность</button>
                    <button type="button" class="chart-mode-tab" data-mode="cashflow" role="tab" aria-selected="false">Поступления</button>
                </div>
            </div>
            <div class="chart-box" id="chart"></div>
            <div class="chart-legend-mini" id="chart-legend">
                <span style="color:#2E75B6;font-weight:600;">■ Выручка</span>
                <span style="color:#4CAF50;font-weight:600;">■ Прибыль</span>
            </div>
        </div>
        <div class="two-col">
            <div class="section"><h2>🏆 Топ клиентов</h2><div id="clients"></div></div>
            <div class="section"><h2>💰 Должники</h2><div id="debtors"></div></div>
        </div>
    </div>
    <script>
        function money(v) {
            return Number(v || 0).toLocaleString('ru-RU', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' BYN';
        }
        function moneyShort(v) {
            var n = Number(v || 0);
            if (Math.abs(n) >= 1000000) return (n / 1000000).toLocaleString('ru-RU', { maximumFractionDigits: 2 }) + ' млн';
            if (Math.abs(n) >= 1000) return (n / 1000).toLocaleString('ru-RU', { maximumFractionDigits: 1 }) + ' тыс.';
            return n.toLocaleString('ru-RU', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
        }

        function esc(s) {
            if (!s) return '';
            var d = document.createElement('div');
            d.textContent = String(s);
            return d.innerHTML;
        }

        function monthLabelRu(ym) {
            if (!ym || ym.length < 7) return ym || '';
            var parts = ym.split('-');
            var mo = ['янв', 'фев', 'мар', 'апр', 'май', 'июн', 'июл', 'авг', 'сен', 'окт', 'ноя', 'дек'];
            var idx = parseInt(parts[1], 10) - 1;
            if (idx >= 0 && idx < 12) return mo[idx] + ' ' + parts[0];
            return ym.substring(5) + '.' + parts[0];
        }

        var chartMode = 'both';
        var lastTrend = {};

        function setChartMode(mode) {
            chartMode = mode;
            var tabs = document.querySelectorAll('.chart-mode-tab');
            for (var t = 0; t < tabs.length; t++) {
                var b = tabs[t];
                var on = b.getAttribute('data-mode') === mode;
                b.classList.toggle('active', on);
                b.setAttribute('aria-selected', on ? 'true' : 'false');
            }
            var leg = document.getElementById('chart-legend');
            if (mode === 'revenue') {
                leg.innerHTML = '<span style="color:#2E75B6;font-weight:600;">■ Выручка по месяцам</span>';
            } else if (mode === 'profit') {
                leg.innerHTML = '<span style="color:#4CAF50;font-weight:600;">■ Прибыль по месяцам</span>';
            } else if (mode === 'expenses') {
                leg.innerHTML = '<span style="color:#FF9800;font-weight:600;">■ Расходы (включ. зарплата в формуле прибыли)</span>';
            } else if (mode === 'trend') {
                leg.innerHTML = '<span style="color:#2E75B6;font-weight:600;">— Выручка</span> <span style="color:#4CAF50;font-weight:600;">— Прибыль</span>';
            } else if (mode === 'debt') {
                leg.innerHTML = '<span style="color:#e53935;font-weight:600;">■ Задолженность по месяцам</span>';
            } else if (mode === 'cashflow') {
                leg.innerHTML = '<span style="color:#5c6bc0;font-weight:600;">■ Поступления (авансы)</span> <span style="color:#e53935;font-weight:600;">■ Долг</span>';
            } else {
                leg.innerHTML = '<span style="color:#2E75B6;font-weight:600;">■ Выручка</span> <span style="color:#4CAF50;font-weight:600;">■ Прибыль</span>';
            }
            renderChart(lastTrend);
        }

        function renderChart(trend) {
            lastTrend = trend || {};
            var chart = document.getElementById('chart');
            chart.innerHTML = '';
            chart.className = chartMode === 'trend' ? 'chart-line-wrap' : 'chart-box';
            var months = Object.keys(lastTrend).sort();
            if (months.length === 0) {
                chart.className = 'chart-box';
                chart.innerHTML = '<div style="margin:auto;color:#999;padding:1rem;">Нет данных по месяцам (нужны даты у объектов)</div>';
                return;
            }

            var maxV = 1;
            var mi;
            for (mi = 0; mi < months.length; mi++) {
                var row = lastTrend[months[mi]] || {};
                var r = row.revenue || 0;
                var p = row.profit || 0;
                var e = row.expenses || 0;
                var d = row.debt || 0;
                var a = row.advance || 0;
                if (chartMode === 'revenue' && r > maxV) maxV = r;
                else if (chartMode === 'profit' && p > maxV) maxV = p;
                else if (chartMode === 'expenses' && e > maxV) maxV = e;
                else if (chartMode === 'debt' && d > maxV) maxV = d;
                else if (chartMode === 'cashflow') {
                    if (a > maxV) maxV = a;
                    if (d > maxV) maxV = d;
                } else if (chartMode === 'both' || chartMode === 'trend') {
                    if (r > maxV) maxV = r;
                    if (p > maxV) maxV = p;
                }
            }

            if (chartMode === 'trend') {
                var w = Math.max(400, months.length * 56);
                var h = 220;
                var padL = 44, padR = 12, padT = 16, padB = 36;
                var iw = w - padL - padR;
                var ih = h - padT - padB;
                var n = months.length;
                function xAt(i) {
                    if (n <= 1) return padL + iw / 2;
                    return padL + (i / (n - 1)) * iw;
                }
                function yAt(val) {
                    var v = Number(val) || 0;
                    return padT + ih - (v / maxV) * ih;
                }
                var ptsR = [];
                var ptsP = [];
                for (var ti = 0; ti < n; ti++) {
                    var m = months[ti];
                    var tr = lastTrend[m] || {};
                    ptsR.push(xAt(ti) + ',' + yAt(tr.revenue || 0));
                    ptsP.push(xAt(ti) + ',' + yAt(tr.profit || 0));
                }
                var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                svg.setAttribute('viewBox', '0 0 ' + w + ' ' + h);
                svg.setAttribute('width', '100%');
                svg.setAttribute('height', String(h));
                var axis = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                axis.setAttribute('x1', String(padL));
                axis.setAttribute('y1', String(padT + ih));
                axis.setAttribute('x2', String(w - padR));
                axis.setAttribute('y2', String(padT + ih));
                axis.setAttribute('stroke', '#ccc');
                svg.appendChild(axis);
                var pr = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
                pr.setAttribute('fill', 'none');
                pr.setAttribute('stroke', '#2E75B6');
                pr.setAttribute('stroke-width', '2.5');
                pr.setAttribute('points', ptsR.join(' '));
                svg.appendChild(pr);
                var pp = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
                pp.setAttribute('fill', 'none');
                pp.setAttribute('stroke', '#4CAF50');
                pp.setAttribute('stroke-width', '2.5');
                pp.setAttribute('points', ptsP.join(' '));
                svg.appendChild(pp);
                for (var li = 0; li < n; li++) {
                    var m2 = months[li];
                    var tr2 = lastTrend[m2] || {};
                    var cx = xAt(li);
                    var cyR = yAt(tr2.revenue || 0);
                    var cyP = yAt(tr2.profit || 0);
                    var c1 = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    c1.setAttribute('cx', String(cx));
                    c1.setAttribute('cy', String(cyR));
                    c1.setAttribute('r', '4');
                    c1.setAttribute('fill', '#2E75B6');
                    var t1 = document.createElementNS('http://www.w3.org/2000/svg', 'title');
                    t1.textContent = monthLabelRu(m2) + ': выручка ' + money(tr2.revenue);
                    c1.appendChild(t1);
                    svg.appendChild(c1);
                    var c2 = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    c2.setAttribute('cx', String(cx));
                    c2.setAttribute('cy', String(cyP));
                    c2.setAttribute('r', '4');
                    c2.setAttribute('fill', '#4CAF50');
                    var t2 = document.createElementNS('http://www.w3.org/2000/svg', 'title');
                    t2.textContent = monthLabelRu(m2) + ': прибыль ' + money(tr2.profit);
                    c2.appendChild(t2);
                    svg.appendChild(c2);
                    var tx = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    tx.setAttribute('x', String(cx));
                    tx.setAttribute('y', String(h - 8));
                    tx.setAttribute('text-anchor', 'middle');
                    tx.setAttribute('font-size', '10');
                    tx.setAttribute('fill', '#555');
                    tx.textContent = monthLabelRu(m2);
                    svg.appendChild(tx);
                }
                var cap = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                cap.setAttribute('x', '8');
                cap.setAttribute('y', String(padT + 8));
                cap.setAttribute('font-size', '11');
                cap.setAttribute('fill', '#666');
                cap.textContent = 'max ' + moneyShort(maxV) + ' BYN';
                svg.appendChild(cap);
                chart.appendChild(svg);
                var tbl = document.createElement('div');
                tbl.style.overflowX = 'auto';
                tbl.style.marginTop = '8px';
                var tb = '<table class="dataTable" style="font-size:12px;width:100%;min-width:280px;"><thead><tr><th>Месяц</th><th>Выручка</th><th>Прибыль</th></tr></thead><tbody>';
                for (var ri = 0; ri < months.length; ri++) {
                    var rm = months[ri];
                    var rr = lastTrend[rm] || {};
                    tb += '<tr><td>' + esc(monthLabelRu(rm)) + '</td><td style="font-weight:600;color:#1E5A8E">' + esc(money(rr.revenue)) + '</td><td style="font-weight:600;color:#2e7d32">' + esc(money(rr.profit)) + '</td></tr>';
                }
                tb += '</tbody></table>';
                tbl.innerHTML = tb;
                chart.appendChild(tbl);
                return;
            }

            for (var mj = 0; mj < months.length; mj++) {
                var mm = months[mj];
                var trow = lastTrend[mm] || {};
                var rev = trow.revenue || 0;
                var prof = trow.profit || 0;
                var exp = trow.expenses || 0;
                var debt = trow.debt || 0;
                var adv = trow.advance || 0;
                var col = document.createElement('div');
                col.className = 'bar-col';
                var bars = document.createElement('div');
                bars.className = 'bar-stack';
                if (chartMode === 'both') {
                    var b1 = document.createElement('div');
                    b1.className = 'bar bar-r';
                    b1.style.height = Math.max((rev / maxV) * 180, 3) + 'px';
                    b1.title = 'Выручка: ' + money(rev);
                    var b2 = document.createElement('div');
                    b2.className = 'bar bar-p';
                    b2.style.height = Math.max((prof / maxV) * 180, 3) + 'px';
                    b2.title = 'Прибыль: ' + money(prof);
                    bars.appendChild(b1);
                    bars.appendChild(b2);
                } else if (chartMode === 'revenue') {
                    var br = document.createElement('div');
                    br.className = 'bar bar-r bar-wide';
                    br.style.height = Math.max((rev / maxV) * 180, 3) + 'px';
                    br.title = money(rev);
                    bars.appendChild(br);
                } else if (chartMode === 'profit') {
                    var bp = document.createElement('div');
                    bp.className = 'bar bar-p bar-wide';
                    bp.style.height = Math.max((prof / maxV) * 180, 3) + 'px';
                    bp.title = money(prof);
                    bars.appendChild(bp);
                } else if (chartMode === 'expenses') {
                    var be = document.createElement('div');
                    be.className = 'bar bar-e bar-wide';
                    be.style.height = Math.max((exp / maxV) * 180, 3) + 'px';
                    be.title = 'Расходы: ' + money(exp);
                    bars.appendChild(be);
                } else if (chartMode === 'debt') {
                    var bd = document.createElement('div');
                    bd.className = 'bar bar-d bar-wide';
                    bd.style.height = Math.max((debt / maxV) * 180, 3) + 'px';
                    bd.title = 'Долг: ' + money(debt);
                    bars.appendChild(bd);
                } else if (chartMode === 'cashflow') {
                    var ba = document.createElement('div');
                    ba.className = 'bar bar-a';
                    ba.style.height = Math.max((adv / maxV) * 180, 3) + 'px';
                    ba.title = 'Поступления: ' + money(adv);
                    var bd2 = document.createElement('div');
                    bd2.className = 'bar bar-d';
                    bd2.style.height = Math.max((debt / maxV) * 180, 3) + 'px';
                    bd2.title = 'Долг: ' + money(debt);
                    bars.appendChild(ba);
                    bars.appendChild(bd2);
                }
                col.appendChild(bars);
                var lbl = document.createElement('div');
                lbl.className = 'bar-label';
                lbl.textContent = monthLabelRu(mm);
                col.appendChild(lbl);
                var sums = document.createElement('div');
                sums.className = 'bar-sums';
                if (chartMode === 'both') {
                    sums.innerHTML = '<div class="sr">' + esc(moneyShort(rev)) + '</div><div class="sp">' + esc(moneyShort(prof)) + '</div><div style="color:#888;font-size:9px;margin-top:2px">' + esc(money(rev)) + '</div><div style="color:#888;font-size:9px">' + esc(money(prof)) + '</div>';
                } else if (chartMode === 'revenue') {
                    sums.innerHTML = '<div class="sr">' + esc(money(rev)) + '</div>';
                } else if (chartMode === 'profit') {
                    sums.innerHTML = '<div class="sp">' + esc(money(prof)) + '</div>';
                } else if (chartMode === 'expenses') {
                    sums.innerHTML = '<div style="color:#e65100;font-weight:600">' + esc(money(exp)) + '</div>';
                } else if (chartMode === 'debt') {
                    sums.innerHTML = '<div style="color:#c62828;font-weight:600">' + esc(money(debt)) + '</div>';
                } else if (chartMode === 'cashflow') {
                    sums.innerHTML = '<div style="color:#3949ab;font-weight:600">' + esc(moneyShort(adv)) + '</div><div style="color:#c62828;font-weight:600">' + esc(moneyShort(debt)) + '</div>';
                }
                col.appendChild(sums);
                chart.appendChild(col);
            }
        }

        function profitColorClass(v) {
            return Number(v) >= 0 ? '#2e7d32' : '#c62828';
        }

        function renderDebtPanel(s) {
            var panel = document.getElementById('debt-panel');
            if (!panel || !s) return;
            var rev = Number(s.total_revenue) || 0;
            var adv = Number(s.total_advance) || 0;
            var debt = Number(s.total_debt) || 0;
            var paidPct = Number(s.paid_pct) || 0;
            var over = Number(s.advance_over_revenue) || 0;
            var paidW = rev > 0 ? Math.min(100, Math.max(0, paidPct)) : 0;
            var debtW = rev > 0 ? Math.min(100 - paidW, Math.max(0, (debt / rev) * 100)) : 0;
            var advNote = over > 0
                ? 'Авансы на ' + esc(money(adv)) + ' — больше начисленной выручки на ' + esc(money(over)) + ' (предоплата, закрытые объекты)'
                : 'Авансы по всем объектам: ' + esc(money(adv));
            var prof = Number(s.total_profit) || 0;
            panel.innerHTML =
                '<div><div class="debt-big">' + esc(money(debt)) + '</div>' +
                '<div class="debt-sub">Общая задолженность · ' + (s.debt_objects || 0) + ' объект(ов)</div>' +
                '<div class="collection-track" title="От начисленной выручки ' + esc(money(rev)) + '">' +
                '<div class="collection-paid" style="width:' + paidW + '%" title="Оплачено (без долга): ' + paidPct + '%"></div>' +
                '<div class="collection-debt" style="width:' + debtW + '%" title="Долг ' + esc(money(debt)) + '"></div>' +
                '</div>' +
                '<div style="font-size:12px;color:#555;">По выручке: оплачено <strong style="color:#3949ab">' + paidPct + '%</strong>, в долге <strong style="color:#c62828">' + (rev > 0 ? ((debt / rev) * 100).toFixed(1) : '0') + '%</strong></div>' +
                '<div style="font-size:11px;color:#777;margin-top:4px;">' + advNote + '</div></div>' +
                '<div><div style="font-size:0.9rem;color:#444;line-height:1.55">' +
                '<div>Выручка (всего по базе): <strong>' + esc(money(rev)) + '</strong></div>' +
                '<div>Расходы: <strong style="color:#e65100">' + esc(money(s.total_expenses)) + '</strong></div>' +
                '<div>Прибыль: <strong style="color:' + profitColorClass(prof) + '">' + esc(money(prof)) + '</strong> (' + (s.margin_pct || 0) + '%)</div>' +
                '<div>Прибыль материалов: <strong>' + esc(money(s.total_material_profit)) + '</strong></div>' +
                '</div></div>';
        }

        function renderMonthCompare(mc, portfolioDebt) {
            var sec = document.getElementById('month-compare-section');
            var box = document.getElementById('month-compare');
            if (!sec || !box || !mc || !mc.current) { if (sec) sec.style.display = 'none'; return; }
            sec.style.display = 'block';
            var cur = mc.current;
            var prev = mc.previous || {};
            var curLbl = monthLabelRu(mc.current_month || '');
            var prevLbl = monthLabelRu(mc.previous_month || '');
            function delta(a, b) {
                var x = Number(a) || 0, y = Number(b) || 0;
                if (y === 0) return x === 0 ? 'без изм.' : (x > 0 ? '+100%' : '0%');
                var p = ((x - y) / Math.abs(y)) * 100;
                return (p >= 0 ? '+' : '') + p.toFixed(0) + '%';
            }
            var pDebt = Number(portfolioDebt) || Number(mc.portfolio_debt) || 0;
            box.innerHTML =
                '<p style="font-size:0.85rem;color:#666;margin:0 0 0.5rem;">По объектам с датами работ в календарном месяце (не «всего по базе»).</p>' +
                '<div class="compare-row">' +
                '<div class="compare-chip"><strong>Выручка</strong><span class="chip-month">' + esc(curLbl) + ' vs ' + esc(prevLbl) + '</span>' +
                esc(money(cur.revenue)) + ' <span style="color:#666">(' + delta(cur.revenue, prev.revenue) + ')</span></div>' +
                '<div class="compare-chip"><strong>Прибыль</strong><span class="chip-month">' + esc(curLbl) + '</span>' +
                '<span style="color:' + profitColorClass(cur.profit) + ';font-weight:600">' + esc(money(cur.profit)) + '</span> <span style="color:#666">(' + delta(cur.profit, prev.profit) + ')</span></div>' +
                '<div class="compare-chip"><strong>Долг в месяце</strong><span class="chip-month">объекты ' + esc(curLbl) + '</span>' +
                '<span style="color:#c62828;font-weight:600">' + esc(money(cur.debt)) + '</span> <span style="color:#666">(' + delta(cur.debt, prev.debt) + ')</span></div>' +
                '<div class="compare-chip"><strong>Объектов</strong><span class="chip-month">с работами в ' + esc(curLbl) + '</span>' +
                (cur.objects || 0) + ' <span style="color:#666">(' + delta(cur.objects, prev.objects) + ')</span></div>' +
                '</div>' +
                '<div style="margin-top:0.65rem;font-size:0.88rem;padding:0.5rem 0.75rem;background:#fff8e1;border-radius:8px;">' +
                '<strong>Задолженность всего по базе:</strong> <span style="color:#c62828;font-weight:600">' + esc(money(pDebt)) + '</span>' +
                ' — не привязана к одному месяцу (5 объектов с долгом могут быть из других периодов).</div>';
        }

        function load() {
            fetch('/api/stats/detailed', { credentials: 'same-origin', headers: { Accept: 'application/json' } })
                .then(function (r) {
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    return r.json();
                })
                .then(function (data) {
                    renderPage(data);
                })
                .catch(function (err) {
                    document.getElementById('loading').textContent = 'Ошибка: ' + err.message;
                });
        }

        function renderPage(data) {
            var trend = data.monthly_trend || {};
            var clients = data.top_clients || [];
            var debtors = data.top_debtors || [];
            var statuses = data.status_distribution || {};
            var s = data.summary || {};

            var totalRev = Number(s.total_revenue) || 0;
            var totalProf = Number(s.total_profit) || 0;
            var totalMatProf = Number(s.total_material_profit) || 0;
            var totalDebt = Number(s.total_debt) || 0;
            var totalAdv = Number(s.total_advance) || 0;
            var margin = Number(s.margin_pct != null ? s.margin_pct : (totalRev > 0 ? ((totalProf / totalRev) * 100) : 0));
            var nClients = Number(s.unique_clients) || 0;
            var avgCheck = nClients > 0 ? totalRev / nClients : 0;
            var totalObj = s.objects_total != null ? s.objects_total : (data.year.count || 0);
            var cm = data.calendar_month || {};
            var profCls = totalProf >= 0 ? 'green' : 'red';
            var marginCls = margin >= 30 ? 'green' : (margin < 0 ? 'red' : 'orange');

            renderDebtPanel(s);
            renderMonthCompare(data.month_comparison, totalDebt);

            var mDiv = document.getElementById('metrics');
            mDiv.innerHTML = '';
            var items = [
                { lbl: 'Объектов (всего)', val: totalObj, cls: 'blue', hint: '' },
                { lbl: 'С работами в этом месяце', val: data.month.count || 0, cls: 'purple', hint: monthLabelRu(cm.key || '') },
                { lbl: 'Выручка (всего)', val: money(totalRev), cls: 'blue', hint: '' },
                { lbl: 'Выручка за месяц', val: money(cm.revenue || 0), cls: 'blue', hint: monthLabelRu(cm.key || '') },
                { lbl: 'Задолженность', val: money(totalDebt), cls: 'red', hint: (s.debt_objects || 0) + ' объект.' },
                { lbl: 'Авансы (всего)', val: money(totalAdv), cls: 'purple', hint: 'сумма по всем объектам' },
                { lbl: 'Прибыль (всего)', val: money(totalProf), cls: profCls, hint: '' },
                { lbl: 'Расходы (всего)', val: money(s.total_expenses || 0), cls: 'orange', hint: '' },
                { lbl: 'Прибыль мат.', val: money(totalMatProf), cls: 'orange', hint: '' },
                { lbl: 'Маржа', val: margin + '%', cls: marginCls, hint: 'от всей выручки' },
                { lbl: 'Ср. выручка на клиента', val: money(avgCheck), cls: 'blue', hint: nClients + ' клиент.' }
            ];
            for (var j = 0; j < items.length; j++) {
                var it = items[j];
                var card = document.createElement('div');
                card.className = 'card';
                var hintHtml = it.hint ? '<div class="metrics-hint">' + esc(it.hint) + '</div>' : '';
                card.innerHTML = '<h3>' + esc(it.lbl) + '</h3><div class="val ' + esc(it.cls) + '">' + it.val + '</div>' + hintHtml;
                mDiv.appendChild(card);
            }

            var stDiv = document.getElementById('statuses');
            stDiv.innerHTML = '';
            var stKeys = Object.keys(statuses);
            for (var si = 0; si < stKeys.length; si++) {
                var name = stKeys[si];
                var sp = document.createElement('span');
                sp.className = 'status-badge st-' + name.replace(/ /g, '-');
                sp.textContent = name + ': ' + statuses[name];
                stDiv.appendChild(sp);
            }

            lastTrend = trend;
            renderChart(trend);

            var clDiv = document.getElementById('clients');
            clDiv.innerHTML = '';
            if (clients.length === 0) {
                clDiv.innerHTML = '<div style="color:#999;padding:10px;">Нет данных</div>';
            } else {
                for (var ci = 0; ci < clients.length; ci++) {
                    var c = clients[ci];
                    var d = document.createElement('div');
                    d.className = 'li';
                    d.innerHTML = '<span>' + (ci + 1) + '. ' + esc(c.name) + '</span><span style="color:#2E75B6;font-weight:600;">' + money(c.revenue) + '</span>';
                    clDiv.appendChild(d);
                }
            }

            var dbDiv = document.getElementById('debtors');
            dbDiv.innerHTML = '';
            if (debtors.length === 0) {
                dbDiv.innerHTML = '<div style="color:#999;padding:10px;">Нет должников ✓</div>';
            } else {
                for (var di = 0; di < debtors.length; di++) {
                    var dd = debtors[di];
                    var ddEl = document.createElement('div');
                    ddEl.className = 'li';
                    var objHint = dd.objects ? ' · ' + dd.objects + ' об.' : '';
                    ddEl.innerHTML = '<span>' + (di + 1) + '. ' + esc(dd.name) + objHint + '</span><span style="color:#f44336;font-weight:600;">' + money(dd.debt) + '</span>';
                    dbDiv.appendChild(ddEl);
                }
            }

            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
        }

        document.querySelectorAll('.chart-mode-tab').forEach(function (btn) {
            btn.addEventListener('click', function () {
                var mode = btn.getAttribute('data-mode');
                if (mode) setChartMode(mode);
            });
        });

        load();
    </script>
</body>
</html>
